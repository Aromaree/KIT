<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>VANVION — WHOLESALE CATALOGUE</title>

<style>
@font-face {
  font-family: 'FuturaPT';
  src: url('./futura-pt-book.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#fff;
  --c-card:#faf8f5;
  --c-border:#ede8e0;
  --c-primary:#1a1a18;
  --c-secondary:#8a8178;
  --c-muted:#b0a898;
  --ff:'FuturaPT','Futura','Century Gothic','Trebuchet MS',sans-serif;
}
html{height:100%;background:var(--c-bg)}
body{
  font-family:var(--ff);
  background:var(--c-bg);
  color:var(--c-primary);
  text-transform:uppercase;
  overscroll-behavior:none;
  min-height:100%;
  -webkit-font-smoothing:antialiased;
}
/* HEADER */
#header{
  position:sticky;
  top:0;
  z-index:50;
  background:var(--c-bg);
  border-bottom:1px solid var(--c-border);
  padding:18px 16px 0;
}
.header-top{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:4px;
}
.brand{
  font-family:var(--ff);
  font-weight:400;
  font-size:30px;
  letter-spacing:0.22em;
  color:var(--c-primary);
  text-align:center;
}
.subtitle{
  text-align:center;
  font-size:10px;
  letter-spacing:0.14em;
  color:var(--c-secondary);
  margin-bottom:12px;
  line-height:1.5;
}
#lang-btn{
  position:absolute;
  right:0;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:1px solid var(--c-border);
  font-family:var(--ff);
  font-size:11px;
  letter-spacing:0.12em;
  color:var(--c-secondary);
  cursor:pointer;
  padding:5px 9px;
  line-height:1;
  text-transform:uppercase;
}
#lang-btn:active{background:var(--c-card)}
.search-wrap{
  position:relative;
  margin-bottom:0;
}
#search{
  width:100%;
  border:none;
  border-top:1px solid var(--c-border);
  background:var(--c-bg);
  font-family:var(--ff);
  font-size:13px;
  letter-spacing:0.10em;
  color:var(--c-primary);
  text-transform:uppercase;
  padding:12px 36px 12px 16px;
  outline:none;
  -webkit-appearance:none;
}
#search::placeholder{color:var(--c-muted)}
.search-clear{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  font-size:16px;
  color:var(--c-muted);
  cursor:pointer;
  display:none;
  line-height:1;
  padding:4px;
}
/* TABS */
#tabs{
  display:flex;
  border-bottom:1px solid var(--c-border);
  background:var(--c-bg);
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
#tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;
  font-family:var(--ff);
  font-size:13px;
  letter-spacing:0.12em;
  color:var(--c-muted);
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  padding:13px 18px 11px;
  cursor:pointer;
  text-transform:uppercase;
  white-space:nowrap;
  transition:color 0.15s,border-color 0.15s;
}
.tab.active{
  color:var(--c-primary);
  border-bottom-color:var(--c-primary);
}
/* COUNT ROW */
#count-row{
  padding:9px 16px;
  font-size:11px;
  letter-spacing:0.12em;
  color:var(--c-muted);
  border-bottom:1px solid var(--c-border);
  background:var(--c-bg);
}
/* GRID */
#grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--c-border);
  padding-bottom:calc(16px + env(safe-area-inset-bottom));
}
.card{
  background:var(--c-card);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.card:active .card-img{filter:brightness(0.96)}
.card-img{
  position:relative;
  width:100%;
  aspect-ratio:3/4;
  background:var(--c-card);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card-img svg{opacity:0.13}
.art-tag{
  position:absolute;
  top:8px;
  left:8px;
  font-family:var(--ff);
  font-size:9px;
  letter-spacing:0.10em;
  color:var(--c-secondary);
  background:rgba(250,248,245,0.82);
  padding:3px 6px;
  border:1px solid var(--c-border);
  text-transform:uppercase;
}
.card-info{
  padding:10px 12px 12px;
  border-top:1px solid var(--c-border);
  background:var(--c-card);
}
.card-title{
  font-family:var(--ff);
  font-size:13px;
  letter-spacing:0.10em;
  color:var(--c-primary);
  margin-bottom:8px;
  line-height:1.35;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.color-dots{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}
.color-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,0.10);
  flex:0 0 auto;
}
/* DETAIL OVERLAY */
#detail{
  position:fixed;
  inset:0;
  z-index:100;
  background:var(--c-bg);
  overflow-y:auto;
  overscroll-behavior:contain;
  transform:translateX(100%);
  transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
  -webkit-overflow-scrolling:touch;
}
#detail.open{transform:translateX(0)}
.detail-topbar{
  position:sticky;
  top:0;
  z-index:10;
  background:var(--c-bg);
  border-bottom:1px solid var(--c-border);
  display:flex;
  align-items:center;
  padding:0 16px;
  height:50px;
  gap:12px;
}
#back-btn{
  background:none;
  border:none;
  font-size:22px;
  color:var(--c-primary);
  cursor:pointer;
  padding:4px 8px 4px 0;
  line-height:1;
  flex:0 0 auto;
}
.detail-article{
  font-family:var(--ff);
  font-size:12px;
  letter-spacing:0.14em;
  color:var(--c-secondary);
}
.detail-img{
  width:100%;
  aspect-ratio:3/4;
  background:var(--c-card);
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid var(--c-border);
}
.detail-img svg{opacity:0.10}
.detail-body{
  padding:20px 16px;
}
.detail-cat{
  font-size:11px;
  letter-spacing:0.14em;
  color:var(--c-muted);
  margin-bottom:8px;
}
.detail-name{
  font-family:var(--ff);
  font-size:20px;
  letter-spacing:0.08em;
  color:var(--c-primary);
  margin-bottom:18px;
  line-height:1.3;
}
.detail-colors-label{
  font-size:11px;
  letter-spacing:0.14em;
  color:var(--c-muted);
  margin-bottom:10px;
}
.detail-colors{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:24px;
}
.detail-color{
  display:flex;
  align-items:center;
  gap:7px;
}
.detail-color-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  border:1px solid rgba(0,0,0,0.12);
  flex:0 0 auto;
}
.detail-color-name{
  font-size:11px;
  letter-spacing:0.10em;
  color:var(--c-secondary);
}
.specs-table{
  width:100%;
  border-top:1px solid var(--c-border);
  margin-bottom:24px;
}
.spec-row{
  display:flex;
  border-bottom:1px solid var(--c-border);
  padding:10px 0;
}
.spec-key{
  flex:0 0 44%;
  font-size:11px;
  letter-spacing:0.12em;
  color:var(--c-muted);
}
.spec-val{
  flex:1;
  font-family:var(--ff);
  font-size:13px;
  letter-spacing:0.06em;
  color:var(--c-primary);
}
#share-btn{
  display:block;
  width:100%;
  background:var(--c-primary);
  color:var(--c-bg);
  font-family:var(--ff);
  font-size:13px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  border:none;
  padding:16px;
  cursor:pointer;
  margin-bottom:calc(16px + env(safe-area-inset-bottom));
}
#share-btn:active{background:#333330}
/* EMPTY STATE */
#empty{
  display:none;
  text-align:center;
  padding:60px 24px;
  font-size:12px;
  letter-spacing:0.14em;
  color:var(--c-muted);
}
</style>
</head>

var cardPlaceholderSVG='<svg width="56" height="72" viewBox="0 0 56 72" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="2" width="48" height="68" rx="2" stroke="#1a1a18" stroke-width="1.2"/><path d="M16 2 L16 26 L28 20 L40 26 L40 2" stroke="#1a1a18" stroke-width="1.2"/></svg>';

function filtered(){
  return PRODUCTS.filter(function(p){
    if(activeCat!=='all'&&p.cat!==activeCat)return false;
    if(!query)return true;
    var q=query.toLowerCase();
    return p.id.toLowerCase().includes(q)||
           p.name.ru.toLowerCase().includes(q)||
           p.name.en.toLowerCase().includes(q);
  });
}

function renderGrid(){
  var items=filtered();
  var grid=document.getElementById('grid');
  var empty=document.getElementById('empty');
  var count=document.getElementById('count-row');
  var t=i18n[lang];
  count.textContent=t.count(items.length);
  if(!items.length){
    grid.innerHTML='';
    empty.textContent=t.empty;
    empty.style.display='block';
    return;
  }
  empty.style.display='none';
  var html='';
  for(var i=0;i<items.length;i++){
    var p=items[i];
    var dots='';
    for(var j=0;j<p.colors.length;j++){
      var c=COLORS[p.colors[j]];
      if(c)dots+='<span class="color-dot" style="background:'+c.hex+'" title="'+(lang==='ru'?c.ru:c.en)+'"></span>';
    }
    html+='<div class="card" data-id="'+p.id+'" role="button" tabindex="0">'
      +'<div class="card-img">'+cardPlaceholderSVG
      +'<span class="art-tag">'+p.id+'</span></div>'
      +'<div class="card-info"><div class="card-title">'+p.name[lang]+'</div>'
      +'<div class="color-dots">'+dots+'</div></div></div>';
  }
  grid.innerHTML=html;
  var cards=grid.querySelectorAll('.card');
  for(var k=0;k<cards.length;k++){
    cards[k].addEventListener('click',onCardClick);
    cards[k].addEventListener('keydown',function(e){if(e.key==='Enter')onCardClick.call(this,e);});
  }
}

function onCardClick(e){
  var id=this.getAttribute('data-id');
  var p=PRODUCTS.find(function(x){return x.id===id;});
  if(p)openDetail(p);
}

function openDetail(p){
  currentProduct=p;
  var t=i18n[lang];
  document.getElementById('detail-article').textContent=p.id;
  document.getElementById('detail-cat').textContent=t.catLabel[p.cat]+' · '+t.catBrand;
  document.getElementById('detail-name').textContent=p.name[lang];
  document.getElementById('detail-colors-label').textContent=t.colors;
  var colorsEl=document.getElementById('detail-colors');
  var ch='';
  for(var i=0;i<p.colors.length;i++){
    var c=COLORS[p.colors[i]];
    if(c)ch+='<div class="detail-color"><span class="detail-color-dot" style="background:'+c.hex+'"></span>'
      +'<span class="detail-color-name">'+(lang==='ru'?c.ru:c.en)+'</span></div>';
  }
  colorsEl.innerHTML=ch;
  var sp=p.spec[lang];
  var keys=t.specKeys;
  var vals=[sp.composition,sp.silhouette,sp.lining,sp.buttons,sp.country,sp.sizeRange];
  var sh='';
  for(var j=0;j<keys.length;j++){
    sh+='<div class="spec-row"><span class="spec-key">'+keys[j]+'</span><span class="spec-val">'+vals[j]+'</span></div>';
  }
  document.getElementById('specs-table').innerHTML=sh;
  document.getElementById('share-btn').textContent=t.share;
  var detail=document.getElementById('detail');
  detail.classList.add('open');
  detail.scrollTop=0;
  if(tg&&tg.BackButton){tg.BackButton.show();}
}

function closeDetail(){
  document.getElementById('detail').classList.remove('open');
  currentProduct=null;
  if(tg&&tg.BackButton){tg.BackButton.hide();}
}

document.getElementById('back-btn').addEventListener('click',closeDetail);
if(tg&&tg.BackButton){
  tg.BackButton.onClick(closeDetail);
}

document.getElementById('share-btn').addEventListener('click',function(){
  if(!currentProduct)return;
  var text='VANVION — '+currentProduct.name[lang]+' ('+currentProduct.id+')';
  var url=window.location.href;
  if(navigator.share){
    navigator.share({title:'VANVION',text:text,url:url}).catch(function(){});
  }else if(tg&&tg.openLink){
    tg.openLink('https://t.me/share/url?url='+encodeURIComponent(url)+'&text='+encodeURIComponent(text));
  }
});

var tabs=document.querySelectorAll('.tab');
for(var ti=0;ti<tabs.length;ti++){
  tabs[ti].addEventListener('click',function(){
    activeCat=this.getAttribute('data-cat');
    for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
    this.classList.add('active');
    renderGrid();
  });
}

var searchEl=document.getElementById('search');
var clearEl=document.getElementById('search-clear');
searchEl.addEventListener('input',function(){
  query=this.value.trim();
  clearEl.style.display=query?'block':'none';
  renderGrid();
});
clearEl.addEventListener('click',function(){
  searchEl.value='';
  query='';
  clearEl.style.display='none';
  searchEl.focus();
  renderGrid();
});

document.getElementById('lang-btn').addEventListener('click',function(){
  lang=lang==='ru'?'en':'ru';
  this.textContent=lang==='ru'?'EN':'RU';
  updateLang();
});

function updateLang(){
  var t=i18n[lang];
  document.getElementById('subtitle').textContent=t.subtitle;
  document.getElementById('search').placeholder=t.search;
  var tbs=document.querySelectorAll('.tab');
  for(var i=0;i<tbs.length;i++)tbs[i].textContent=t.tabs[i];
  renderGrid();
  if(currentProduct)openDetail(currentProduct);
}

// init
renderGrid();
})();
</script>
