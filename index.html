<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VANVION</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@font-face {
  font-family: 'Futura PT Book';
  src: url('./futura-pt-book.ttf') format('truetype');
  font-weight: 400;
  font-display: swap;
}
:root {
  --bg: #fff;
  --card: #faf8f5;
  --border: #ede8e0;
  --text: #1a1a18;
  --text2: #8a8178;
  --muted: #b0a898;
  --font: 'Futura PT Book', 'Futura', 'Century Gothic', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  text-transform: uppercase;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  width: 100%;
}
body { font-size: 13px; }
img { display: block; }
button { font-family: var(--font); text-transform: uppercase; cursor: pointer; background: none; border: none; color: inherit; }

.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.header-top {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 16px 4px;
}
.brand {
  font-size: 30px;
  letter-spacing: 0.22em;
  font-weight: 400;
  line-height: 1;
}
.lang-btn {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  border: 1px solid var(--border);
  font-size: 11px;
  letter-spacing: 0.12em;
  padding: 5px 9px;
  color: var(--text2);
}
.subtitle {
  text-align: center;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text2);
  padding: 2px 16px 10px;
}
.search-wrap {
  position: relative;
  border-top: 1px solid var(--border);
}
.search-input {
  width: 100%;
  border: none;
  outline: none;
  font-family: var(--font);
  text-transform: uppercase;
  font-size: 13px;
  letter-spacing: 0.06em;
  color: var(--text);
  background: transparent;
  padding: 11px 40px 11px 16px;
}
.search-input::placeholder { color: var(--muted); letter-spacing: 0.06em; }
.search-clear {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--muted);
  padding: 6px;
  display: none;
}
.search-clear.show { display: block; }

.tabs {
  position: relative;
  z-index: 40;
  display: flex;
  gap: 22px;
  padding: 0 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  white-space: nowrap;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  font-size: 13px;
  letter-spacing: 0.12em;
  color: var(--muted);
  padding: 10px 0;
  border-bottom: 2px solid transparent;
  flex: none;
}
.tab.active {
  color: var(--text);
  border-bottom-color: var(--text);
}

.count {
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--muted);
  padding: 12px 16px 8px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
.card { background: var(--bg); }
.card-img {
  position: relative;
  aspect-ratio: 3/4;
  background: var(--card);
  overflow: hidden;
}
.card-img img { width: 100%; height: 100%; object-fit: cover; }
.card-img .ph {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-img .ph svg { width: 46%; height: 46%; opacity: 0.12; }
.art-tag {
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 9px;
  letter-spacing: 0.08em;
  background: rgba(255,255,255,0.82);
  color: var(--text);
  padding: 3px 6px;
}
.card-info {
  border-top: 1px solid var(--border);
  padding: 10px 12px 12px;
}
.card-name {
  font-size: 13px;
  letter-spacing: 0.10em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.dots { display: flex; gap: 6px; margin-top: 9px; }
.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.12);
  flex: none;
}

.state {
  text-align: center;
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--muted);
  padding: 80px 24px;
}
.retry {
  display: inline-block;
  margin-top: 16px;
  border: 1px solid var(--border);
  padding: 10px 18px;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text);
}

.detail {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: var(--bg);
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.28s ease;
  -webkit-overflow-scrolling: touch;
}
.detail.open { transform: translateX(0); }
.detail-top {
  position: sticky;
  top: 0;
  z-index: 10;
  height: 50px;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.back-btn { font-size: 20px; line-height: 1; padding: 4px 6px 4px 0; }
.detail-art { font-size: 11px; letter-spacing: 0.14em; color: var(--text2); }
.detail-img {
  position: relative;
  aspect-ratio: 3/4;
  width: 100%;
  background: var(--card);
  overflow: hidden;
}
.detail-img img { width: 100%; height: 100%; object-fit: cover; }
.detail-img .ph { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.detail-img .ph svg { width: 40%; height: 40%; opacity: 0.12; }
.detail-body { padding: 20px 16px calc(28px + env(safe-area-inset-bottom)); }
.detail-cat { font-size: 11px; letter-spacing: 0.12em; color: var(--muted); }
.detail-name { font-size: 20px; letter-spacing: 0.08em; line-height: 1.2; margin-top: 6px; }
.section-label { font-size: 11px; letter-spacing: 0.14em; color: var(--muted); margin: 22px 0 10px; }
.chips { display: flex; flex-wrap: wrap; gap: 14px; }
.chip { display: flex; align-items: center; gap: 7px; font-size: 11px; letter-spacing: 0.08em; color: var(--text2); }
.chip .dot { width: 12px; height: 12px; }
.specs { border-top: 1px solid var(--border); margin-top: 22px; }
.spec-row { display: flex; border-bottom: 1px solid var(--border); padding: 11px 0; }
.spec-key { width: 44%; font-size: 11px; letter-spacing: 0.10em; color: var(--muted); }
.spec-val { width: 56%; font-size: 13px; letter-spacing: 0.06em; color: var(--text); }
.share-btn {
  width: 100%;
  background: var(--text);
  color: #fff;
  font-size: 13px;
  letter-spacing: 0.12em;
  padding: 16px;
  margin-top: 26px;
}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="brand">VANVION</div>
    <button class="lang-btn" id="langBtn">EN</button>
  </div>
  <div class="subtitle" id="subtitle"></div>
  <div class="search-wrap">
    <input type="text" class="search-input" id="search" autocomplete="off">
    <button class="search-clear" id="searchClear">&#10005;</button>
  </div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="count" id="count"></div>
<div id="content"></div>

<div class="detail" id="detail">
  <div class="detail-top">
    <button class="back-btn" id="backBtn">&#8592;</button>
    <span class="detail-art" id="detailArt"></span>
  </div>
  <div id="detailContent"></div>
</div>

<script>
const DATA_URL = './data/products.json';

const PALETTE = {
  charcoal: { hex: '#4a4a48', ru: 'УГОЛЬНЫЙ', en: 'CHARCOAL' },
  navy: { hex: '#1c2744', ru: 'ТЁМНО-СИНИЙ', en: 'NAVY' },
  black: { hex: '#18181a', ru: 'ЧЁРНЫЙ', en: 'BLACK' },
  camel: { hex: '#c2935a', ru: 'КЭМЕЛ', en: 'CAMEL' },
  beige: { hex: '#d4c4a8', ru: 'БЕЖЕВЫЙ', en: 'BEIGE' },
  grey: { hex: '#9a9a98', ru: 'СЕРЫЙ', en: 'GREY' },
  brown: { hex: '#6b4226', ru: 'КОРИЧНЕВЫЙ', en: 'BROWN' },
  green: { hex: '#2d3d2e', ru: 'ЗЕЛЁНЫЙ', en: 'GREEN' },
  lightgrey: { hex: '#c8c6c2', ru: 'СВЕТЛО-СЕРЫЙ', en: 'LIGHT GREY' },
  burgundy: { hex: '#5c1a2a', ru: 'БОРДОВЫЙ', en: 'BURGUNDY' },
  sand: { hex: '#e0d4b8', ru: 'ПЕСОЧНЫЙ', en: 'SAND' },
  slate: { hex: '#5a6472', ru: 'СЛАНЦЕВЫЙ', en: 'SLATE' }
};

const I18N = {
  ru: {
    subtitle: 'ОПТОВЫЙ КАТАЛОГ · МУЖСКАЯ КЛАССИКА',
    search: 'ПОИСК ПО АРТИКУЛУ ИЛИ НАЗВАНИЮ',
    tabs: { all: 'ВСЕ', bryuki: 'БРЮКИ', pidzhaki: 'ПИДЖАКИ', palto: 'ПАЛЬТО' },
    count: n => n + ' ' + plural(n, 'ПОЗИЦИЯ', 'ПОЗИЦИИ', 'ПОЗИЦИЙ'),
    cat: { bryuki: 'БРЮКИ', pidzhaki: 'ПИДЖАКИ', palto: 'ПАЛЬТО' },
    specs: ['СОСТАВ', 'СИЛУЭТ', 'ПОДКЛАДКА', 'ПУГОВИЦЫ', 'СТРАНА', 'РАЗМЕРНЫЙ РЯД'],
    colors: 'ЦВЕТА',
    share: 'ПОДЕЛИТЬСЯ',
    empty: 'НИЧЕГО НЕ НАЙДЕНО',
    loading: 'ЗАГРУЗКА...',
    error: 'ОШИБКА ЗАГРУЗКИ',
    retry: 'ПОВТОРИТЬ'
  },
  en: {
    subtitle: 'WHOLESALE CATALOGUE · MENSWEAR',
    search: 'SEARCH BY ARTICLE OR NAME',
    tabs: { all: 'ALL', bryuki: 'TROUSERS', pidzhaki: 'JACKETS', palto: 'COATS' },
    count: n => n + ' ' + (n === 1 ? 'ITEM' : 'ITEMS'),
    cat: { bryuki: 'TROUSERS', pidzhaki: 'JACKETS', palto: 'COATS' },
    specs: ['COMPOSITION', 'SILHOUETTE', 'LINING', 'BUTTONS', 'COUNTRY', 'SIZE RANGE'],
    colors: 'COLORS',
    share: 'SHARE',
    empty: 'NOTHING FOUND',
    loading: 'LOADING...',
    error: 'LOADING ERROR',
    retry: 'RETRY'
  }
};

function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

const PH_SVG = '<svg viewBox="0 0 64 96" fill="none" stroke="#1a1a18" stroke-width="1.5"><path d="M20 12 L32 8 L44 12 L48 28 L40 30 L40 86 L24 86 L24 30 L16 28 Z"/></svg>';

let LANG = 'ru';
let CAT = 'all';
let QUERY = '';
let PRODUCTS = [];

const tg = window.Telegram && window.Telegram.WebApp;

const $ = id => document.getElementById(id);

function t() { return I18N[LANG]; }

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function parseCSV(text) {
  const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim() !== '');
  if (!lines.length) return [];
  const split = line => {
    const out = [];
    let cur = '', q = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (q && line[i + 1] === '"') { cur += '"'; i++; }
        else q = !q;
      } else if (c === ',' && !q) { out.push(cur); cur = ''; }
      else cur += c;
    }
    out.push(cur);
    return out;
  };
  const headers = split(lines[0]).map(h => h.trim());
  return lines.slice(1).map(line => {
    const cells = split(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cells[i] || '').trim(); });
    return obj;
  });
}

async function loadData() {
  renderState(t().loading);
  try {
    const res = await fetch(DATA_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('http ' + res.status);
    const text = await res.text();
    PRODUCTS = DATA_URL.includes('spreadsheets') ? parseCSV(text) : JSON.parse(text);
    render();
  } catch (e) {
    renderError();
  }
}

function colorList(str) {
  return (str || '').split(',').map(c => c.trim()).filter(c => PALETTE[c]);
}

function getName(p) { return LANG === 'ru' ? (p.name_ru || p.name_en || '') : (p.name_en || p.name_ru || ''); }

function filtered() {
  const q = QUERY.trim().toLowerCase();
  return PRODUCTS.filter(p => {
    if (CAT !== 'all' && p.cat !== CAT) return false;
    if (q) {
      const hay = ((p.id || '') + ' ' + (p.name_ru || '') + ' ' + (p.name_en || '')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderState(msg) {
  $('content').innerHTML = '<div class="state">' + msg + '</div>';
  $('count').textContent = '';
}

function renderError() {
  $('content').innerHTML = '<div class="state">' + t().error +
    '<br><button class="retry" id="retryBtn">' + t().retry + '</button></div>';
  $('count').textContent = '';
  $('retryBtn').onclick = loadData;
}

function render() {
  $('subtitle').textContent = t().subtitle;
  $('search').placeholder = t().search;
  $('langBtn').textContent = LANG === 'ru' ? 'EN' : 'RU';
  renderTabs();

  const items = filtered();
  $('count').textContent = t().count(items.length);

  if (!items.length) {
    $('content').innerHTML = '<div class="state">' + t().empty + '</div>';
    return;
  }

  $('content').innerHTML = '<div class="grid">' + items.map(cardHTML).join('') + '</div>';
  document.querySelectorAll('.card').forEach(el => {
    el.onclick = () => openDetail(el.getAttribute('data-id'));
  });
}

function renderTabs() {
  const order = ['all', 'bryuki', 'pidzhaki', 'palto'];
  $('tabs').innerHTML = order.map(c =>
    '<button class="tab' + (CAT === c ? ' active' : '') + '" data-cat="' + c + '">' + t().tabs[c] + '</button>'
  ).join('');
  document.querySelectorAll('.tab').forEach(el => {
    el.onclick = () => { CAT = el.getAttribute('data-cat'); render(); };
  });
}

function dotHTML(c) {
  return '<span class="dot" style="background:' + PALETTE[c].hex + '"></span>';
}

function imgBlock(p, cls) {
  const inner = p.image
    ? '<img src="' + esc(p.image) + '" alt="" loading="lazy">'
    : '<div class="ph">' + PH_SVG + '</div>';
  return '<div class="' + cls + '">' + inner;
}

function cardHTML(p) {
  const dots = colorList(p.colors).map(dotHTML).join('');
  return '<div class="card" data-id="' + esc(p.id) + '">' +
    imgBlock(p, 'card-img') +
      '<span class="art-tag">' + esc(p.id) + '</span>' +
    '</div>' +
    '<div class="card-info">' +
      '<div class="card-name">' + esc(getName(p)) + '</div>' +
      '<div class="dots">' + dots + '</div>' +
    '</div>' +
  '</div>';
}

function openDetail(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  const ru = LANG === 'ru';
  const specs = [
    ru ? p.comp_ru : p.comp_en,
    ru ? p.sil_ru : p.sil_en,
    ru ? p.lin_ru : p.lin_en,
    ru ? p.btn_ru : p.btn_en,
    ru ? p.country_ru : p.country_en,
    p.sizes
  ];
  const chips = colorList(p.colors).map(c =>
    '<span class="chip">' + dotHTML(c) + esc(PALETTE[c][LANG]) + '</span>'
  ).join('');
  const rows = t().specs.map((k, i) =>
    '<div class="spec-row"><div class="spec-key">' + k + '</div><div class="spec-val">' + esc(specs[i] || '—') + '</div></div>'
  ).join('');

  $('detailArt').textContent = p.id;
  $('detailContent').innerHTML =
    imgBlock(p, 'detail-img') + '</div>' +
    '<div class="detail-body">' +
      '<div class="detail-cat">' + (t().cat[p.cat] || esc(p.cat)) + ' · VANVION</div>' +
      '<div class="detail-name">' + esc(getName(p)) + '</div>' +
      '<div class="section-label">' + t().colors + '</div>' +
      '<div class="chips">' + chips + '</div>' +
      '<div class="specs">' + rows + '</div>' +
      '<button class="share-btn" id="shareBtn">' + t().share + '</button>' +
    '</div>';

  $('shareBtn').onclick = () => shareProduct(p);

  $('detailContent').parentElement.scrollTop = 0;
  $('detail').classList.add('open');
  if (tg && tg.BackButton) tg.BackButton.show();
}

function closeDetail() {
  $('detail').classList.remove('open');
  if (tg && tg.BackButton) tg.BackButton.hide();
}

async function shareProduct(p) {
  const text = 'VANVION · ' + p.id + ' · ' + getName(p);
  const url = location.href;
  try {
    if (navigator.share) {
      await navigator.share({ title: 'VANVION', text: text, url: url });
      return;
    }
  } catch (e) { return; }
  if (tg && tg.openLink) {
    try {
      tg.openLink('https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(text));
      return;
    } catch (e) {}
  }
  try { await navigator.clipboard.writeText(text + ' ' + url); } catch (e) {}
}

$('langBtn').onclick = () => { LANG = LANG === 'ru' ? 'en' : 'ru'; render(); };
$('search').oninput = e => {
  QUERY = e.target.value;
  $('searchClear').classList.toggle('show', QUERY.length > 0);
  render();
};
$('searchClear').onclick = () => {
  QUERY = '';
  $('search').value = '';
  $('searchClear').classList.remove('show');
  render();
};
$('backBtn').onclick = closeDetail;

document.addEventListener('DOMContentLoaded', () => {
  if (tg) {
    tg.ready();
    tg.expand();
    if (tg.BackButton) tg.BackButton.onClick(closeDetail);
  }
  loadData();
});
</script>
</body>
</html>
